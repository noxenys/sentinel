name = "sentinel"
main = "worker.js"
compatibility_date = "2026-01-01"

[env.production.vars]
# 设置你的环境变量
# PASSWORD = "你的管理员密码"
# TELEGRAM_TOKEN = "你的Telegram机器人令牌"
# CHAT_ID = "你的Telegram聊天ID"

# KV存储命名空间
[[kv_namespaces]]
binding = "SENTINEL_KV"
id = "你的KV命名空间ID"
preview_id = "你的预览KV命名空间ID"

# 可选：D1数据库（如果需要）
# [[d1_databases]]
# binding = "SENTINEL_DB"
# database_name = "sentinel-db"
# database_id = "你的D1数据库ID"

